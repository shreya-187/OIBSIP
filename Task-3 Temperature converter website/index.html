<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden">

        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-8 text-center">
            <h1 class="text-4xl font-bold tracking-tight">🌡️ TempConvert</h1>
            <p class="mt-2 opacity-90">Instant temperature conversions</p>
        </div>

        <div class="p-8">

            <!-- Input -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Temperature
                </label>

                <div class="flex gap-3">

                    <input
                        type="number"
                        id="tempInput"
                        step="any"
                        class="flex-1 px-5 py-4 border border-gray-300 rounded-2xl text-3xl font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="Enter temperature">

                    <select
                        id="fromUnit"
                        class="px-5 py-4 border border-gray-300 rounded-2xl text-xl font-medium bg-white"
                        onchange="updateToUnits()">

                        <option value="C">°C</option>
                        <option value="F">°F</option>
                        <option value="K">K</option>

                    </select>

                </div>
            </div>

            <!-- Swap Button -->
            <div class="flex justify-center my-4">

                <div onclick="swapUnits()"
                    class="cursor-pointer bg-gray-100 hover:bg-gray-200 transition-colors w-10 h-10 rounded-2xl flex items-center justify-center text-2xl">

                    ⇄

                </div>

            </div>

            <!-- Output Unit -->
            <div class="mb-8">

                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Convert To
                </label>

                <select
                    id="toUnit"
                    class="w-full px-5 py-4 border border-gray-300 rounded-2xl text-xl font-medium bg-white">

                </select>

            </div>

            <!-- Button -->
            <button
                onclick="convertTemperature()"
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-semibold text-xl py-5 rounded-3xl transition-all shadow-lg">

                Convert

            </button>

            <!-- Result -->
            <div id="result"
                class="result mt-8 min-h-[120px] bg-gray-50 rounded-3xl p-8 text-center hidden">

                <div class="text-sm text-gray-500 mb-1">RESULT</div>

                <div id="resultValue"
                    class="text-6xl font-bold text-gray-800"></div>

                <div id="resultUnit"
                    class="text-2xl text-gray-600 mt-1"></div>

            </div>

            <!-- Error -->
            <div id="error"
                class="hidden mt-4 text-center text-red-500 text-sm"></div>

        </div>

        <div class="border-t border-gray-100 p-4 text-center text-xs text-gray-400">
            Supports Celsius, Fahrenheit & Kelvin
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
